# ─────────────────────────────────────────────────────────────────────────────
# Extent Reports — Spark (HTML) reporter configuration
# Picked up automatically by the ExtentCucumberAdapter Cucumber plugin.
#
# ${project.build.directory} is substituted by Maven resource filtering at
# process-test-resources time, so it resolves to the actual build directory
# (e.g. target_20260224_175652 when run via run-tests.sh).
# ─────────────────────────────────────────────────────────────────────────────

extent.reporter.spark.start=true
extent.reporter.spark.out=${project.build.directory}/extent-report/ExtentSpark.html

# Screenshot directories — must match the paths used in Hooks.java
# Hooks.java writes PNG bytes to: <buildDir>/extent/screenshots/<safe-name>.png
# screenshot.rel.path is a relative path from the HTML file to the screenshots
# folder and stays constant regardless of the build directory name.
screenshot.dir=${project.build.directory}/extent/screenshots/
screenshot.rel.path=../extent/screenshots/

# System info panel shown at the top of the report
systeminfo.Project=KC SDET Automation
systeminfo.Environment=${env}
systeminfo.Framework=Cucumber 7 + Selenium + RestAssured
systeminfo.Allure=2.27.0
systeminfo.Extent=5.1.2
