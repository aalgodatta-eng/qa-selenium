# ─────────────────────────────────────────────────────────────────────────────
# Extent Reports — Spark (HTML) reporter configuration
# Picked up automatically by the ExtentCucumberAdapter Cucumber plugin.
# ─────────────────────────────────────────────────────────────────────────────

extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-report/ExtentSpark.html

# Screenshot directories — must match the paths used in Hooks.java
# Hooks.java writes to: target/extent/screenshots/<safe-name>.png
# The relative path is used by Extent to link thumbnails in the HTML report.
screenshot.dir=target/extent/screenshots/
screenshot.rel.path=../extent/screenshots/

# System info panel shown at the top of the report
systeminfo.Project=KC SDET Automation
systeminfo.Environment=QA
systeminfo.Framework=Cucumber 7 + Selenium + RestAssured
systeminfo.Allure=2.27.0
systeminfo.Extent=5.1.2
