# ============================
# ReportPortal configuration
# ============================

rp.endpoint = https://YOUR_REPORTPORTAL_URL/api/v1
rp.uuid = YOUR_API_TOKEN
rp.launch = KC-SDET-Automation
rp.project = YOUR_PROJECT_NAME

rp.enable = true
rp.description = KC SDET Automation Execution
rp.attributes = type:automation;framework:cucumber;team:QE

# Optional
rp.convertimage = true
rp.skipped.issue = false

# You can override any rp.* via -D system properties from Jenkins/Maven.
