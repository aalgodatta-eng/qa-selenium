# ─────────────────────────────────────────────────────────────────────────────
# KC-SDET — Unified Docker Compose Stack
#
# Profiles:
#   grid  → just Selenium Hub + browser nodes
#   tests → grid + test runner jobs
#   ci    → Jenkins (optionally with grid/tests)
#
# Usage:
#   # Start Jenkins only:
#   docker compose -f kc-stack.yml --profile ci up -d jenkins
#
#   # Start grid only (for local dev / IDE runs):
#   docker compose -f kc-stack.yml --profile grid up -d
#
#   # Run tests (grid + runners):
#   docker compose -f kc-stack.yml --profile tests up --build --exit-code-from ui-smoke-chrome
#
#   # Tear everything down:
#   docker compose -f kc-stack.yml --profile grid down
#   docker compose -f kc-stack.yml --profile tests down
#
# Notes:
# - Uses MAP syntax (key: value) so YAML merge keys (<<:) work in Compose v2.
# - Fixes Jenkins GitHub checkout DNS issue by setting dns: on the Jenkins service.
# ─────────────────────────────────────────────────────────────────────────────

x-selenium-node: &selenium-node
  profiles: [grid, tests]
  depends_on: [selenium-hub]
  shm_size: 2gb
  environment: &node-env
    SE_EVENT_BUS_HOST: selenium-hub
    SE_EVENT_BUS_PUBLISH_PORT: "4442"
    SE_EVENT_BUS_SUBSCRIBE_PORT: "4443"
    SE_NODE_MAX_SESSIONS: "4"
    SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
    SE_ENABLE_VNC: "true"
  volumes:
    - /dev/shm:/dev/shm

x-test-runner: &test-runner
  profiles: [tests]
  build:
    context: .
    dockerfile: Dockerfile.runner
  # Prefer a pinned, pre-built runner image for CI reproducibility.
  # If you push your runner to DockerHub, set this to your tag:
  # image: administratorkc/kc-test-runner:1.0.0
  image: kc-test-runner:latest
  environment: &runner-env
    ENV: qa
    RUNMODE: grid
    HEADLESS: "true"
    GRIDURL: http://selenium-hub:4444/wd/hub
    # Default UI smoke tag in repo (alias for @ui and @smoke)
    TAGS: "@ui_smoke"
    THREADS: "2"
    RETRY: "2"
  volumes:
    - ./reports:/work/artifacts

services:

  # ── Jenkins (CI) ─────────────────────────────────────────────────────────
  # Fixes "Could not resolve host: github.com" via explicit DNS.
  # Also mounts docker.sock so pipelines can run docker/compose commands.
  jenkins:
    profiles: [ci]
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "9090:8080"
      - "50000:50000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      # If behind proxy, uncomment and set:
      # http_proxy: http://proxy-host:proxy-port
      # https_proxy: http://proxy-host:proxy-port
      # no_proxy: localhost,127.0.0.1,.local
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # ── Selenium Grid ────────────────────────────────────────────────────────

  selenium-hub:
    profiles: [grid, tests]
    image: selenium/hub:4.22.0
    ports:
      - "4444:4444"
      - "4442:4442"   # event bus publish
      - "4443:4443"   # event bus subscribe
    environment:
      SE_ENABLE_TRACING: "false"
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:4444/wd/hub/status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18

  chrome:
    <<: *selenium-node
    image: selenium/node-chrome:4.22.0
    ports:
      - "7901:7900"   # noVNC viewer

  firefox:
    <<: *selenium-node
    image: selenium/node-firefox:4.22.0
    ports:
      - "7902:7900"

  edge:
    <<: *selenium-node
    image: selenium/node-edge:4.22.0
    ports:
      - "7903:7900"

  # ── Test Runner Jobs ─────────────────────────────────────────────────────

  ui-smoke-chrome:
    <<: *test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
      chrome:
        condition: service_started
    environment:
      <<: *runner-env
      SUITE: ui
      BROWSER: chrome
      REPORT_SUFFIX: ui-chrome

  ui-smoke-firefox:
    <<: *test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
      firefox:
        condition: service_started
    environment:
      <<: *runner-env
      SUITE: ui
      BROWSER: firefox
      REPORT_SUFFIX: ui-firefox

  ui-smoke-edge:
    <<: *test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
      edge:
        condition: service_started
    environment:
      <<: *runner-env
      SUITE: ui
      BROWSER: edge
      REPORT_SUFFIX: ui-edge

  api-smoke:
    <<: *test-runner
    environment:
      SUITE: api
      ENV: qa
      RUNMODE: local
      TAGS: "@api_smoke or @api_regression"
      API_BASE_URL: https://httpbin.org
      THREADS: "2"
      RETRY: "3"
      REPORT_SUFFIX: api

volumes:
  jenkins_home:
