services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/kotc/.kube/config-jenkins:/var/jenkins_home/.kube/config:ro
    user: root
    environment:
      - KUBECONFIG=/var/jenkins_home/.kube/config

volumes:
  jenkins_home:
