
services:
  postgres:
    image: postgres:16
    container_name: kcqe-postgres
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kcqe
      - POSTGRES_USER=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
