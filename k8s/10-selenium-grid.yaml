apiVersion: v1
kind: Service
metadata:
  name: selenium-hub
  namespace: qa
spec:
  selector:
    app: selenium-hub
  ports:
    - name: web
      port: 4444
      targetPort: 4444
    - name: event-publish
      port: 4442
      targetPort: 4442
    - name: event-subscribe
      port: 4443
      targetPort: 4443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-hub
  namespace: qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium-hub
  template:
    metadata:
      labels:
        app: selenium-hub
    spec:
      containers:
        - name: hub
          image: selenium/hub:4.22.0
          ports:
            - containerPort: 4444
            - containerPort: 4442
            - containerPort: 4443
          env:
            - name: SE_ENABLE_TRACING
              value: "false"
          readinessProbe:
            httpGet:
              path: /status
              port: 4444
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-node-firefox
  namespace: qa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: selenium-node-firefox
  template:
    metadata:
      labels:
        app: selenium-node-firefox
    spec:
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
      containers:
        - name: node
          image: selenium/node-firefox:4.22.0
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          env:
            - name: SE_EVENT_BUS_HOST
              value: "selenium-hub"
            - name: SE_EVENT_BUS_PUBLISH_PORT
              value: "4442"
            - name: SE_EVENT_BUS_SUBSCRIBE_PORT
              value: "4443"
            - name: SE_NODE_MAX_SESSIONS
              value: "2"
            - name: SE_NODE_OVERRIDE_MAX_SESSIONS
              value: "true"
          ports:
            - containerPort: 5555
---
