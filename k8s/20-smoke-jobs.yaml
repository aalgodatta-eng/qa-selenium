            - name: ENV
              value: "qa"
            - name: RUNMODE
              value: "local"
            - name: TAGS
              value: "@api_smoke"
            - name: THREADS
              value: "2"
            - name: API_BASE_URL
              value: "https://jsonplaceholder.typicode.com"
            - name: RETRY
              value: "3"
            - name: REPORT_SUFFIX
              value: "api"
          volumeMounts:
            - name: artifacts
              mountPath: /work/artifacts
