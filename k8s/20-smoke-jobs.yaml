apiVersion: batch/v1
kind: Job
metadata:
  name: api-smoke
  namespace: qa
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: artifacts
          emptyDir: {}
      containers:
        - name: runner
          image: kc-sdet-automation:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SUITE
              value: "api"
            - name: ENV
              value: "qa"
            - name: RUNMODE
              value: "local"
            - name: TAGS
              value: "@api_smoke"
            - name: THREADS
              value: "2"
            - name: API_BASE_URL
              value: "https://jsonplaceholder.typicode.com"
            - name: RETRY
              value: "3"
            - name: REPORT_SUFFIX
              value: "api"
          volumeMounts:
            - name: artifacts
              mountPath: /work/artifacts
