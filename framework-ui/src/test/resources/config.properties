# UITestingPlayground Automation Configuration
# Can be overridden via command-line: -DpropertyName=value

# Base URL
baseUrl=http://uitestingplayground.com

# Browser: chrome | firefox | edge
browser=chrome

# Run browser in headless mode (true/false)
headless=false

# Wait timeouts (in seconds)
implicitWait=10
explicitWait=30
pageLoadTimeout=60
