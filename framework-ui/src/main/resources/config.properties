# UITestingPlayground Automation Configuration
# Default values — overridden by env/{env}.properties at runtime
# and by -Dkey=value system properties passed via Maven Surefire.

# Base URL for UITestingPlayground
baseUrl=http://uitestingplayground.com

# Browser: chrome | firefox | edge
browser=chrome

# Run browser in headless mode (true/false)
headless=false

# Wait timeouts (in seconds)
implicitWait=10
explicitWait=30
pageLoadTimeout=60
